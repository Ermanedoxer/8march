<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>С 8 Марта, 11E!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Marck+Script&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="background-glow"></div>
  <main class="card" aria-label="Поздравление с 8 марта для класса 11E">
    <p class="badge">11E 💐</p>
    <h1>С Международным женским днём!</h1>
    <p class="subtitle">
      Дорогие девочки, вы делаете каждый день ярче, добрее и красивее.
      Пусть в вашей жизни будет много радости, вдохновения и больших побед!
    </p>

    <section class="names" aria-labelledby="names-title">
      <h2 id="names-title">Для вас, с теплом:</h2>
      <ul>
        <li>Арайлым</li>
        <li>Жәудір</li>
        <li>Назым</li>
        <li>Жібек</li>
        <li>Назерке</li>
        <li>Салтанат</li>
        <li>Индира</li>
        <li>Асыл</li>
      </ul>
    </section>

    <button id="celebrateBtn" class="btn">Нажми для сюрприза ✨</button>
  </main>

  <canvas id="confettiCanvas" aria-hidden="true"></canvas>

  <script src="script.js"></script>
</body>
</html>
